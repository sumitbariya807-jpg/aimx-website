<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AIMX 2026 Registration</title>
  <link href="https://fonts.cdnfonts.com/css/bebas-neue" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Bebas Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0D0D1A 0%, #1A0A2E 100%);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 700px;
      margin: 0 auto;
      background: rgba(13, 13, 26, 0.95);
      padding: 40px;
      border-radius: 20px;
      border: 3px solid #FF6B35;
      box-shadow: 0 20px 60px rgba(255, 107, 53, 0.4);
    }
    
    h1 {
      text-align: center;
      font-size: 3.5rem;
      color: #FF6B35;
      margin-bottom: 20px;
      letter-spacing: 6px;
      text-shadow: 0 0 25px #FF6B35;
    }
    
    h2 {
      color: #00D4FF;
      margin: 30px 0 20px 0;
      font-size: 1.8rem;
      letter-spacing: 3px;
    }
    
    .payment-box {
      background: rgba(255, 107, 53, 0.2);
      border: 2px solid #FF6B35;
      border-radius: 15px;
      padding: 25px;
      margin-bottom: 30px;
    }
    
    .payment-option {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding: 15px;
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
    }
    
    label {
      display: block;
      color: #00D4FF;
      margin-bottom: 10px;
      font-size: 1.2rem;
      letter-spacing: 1px;
    }
    
    input, select {
      width: 100%;
      padding: 18px;
      margin-bottom: 20px;
      border: 2px solid #FF6B35;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 1.2rem;
      font-family: inherit;
    }
    
    input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #00D4FF;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
    }
    
    .screenshot-box {
      border: 3px dashed #FF1493;
      border-radius: 20px;
      padding: 50px 20px;
      text-align: center;
      cursor: pointer;
      background: rgba(255, 20, 147, 0.1);
      margin: 30px 0;
      min-height: 160px;
      transition: all 0.3s;
      font-size: 1.3rem;
    }
    
    .screenshot-box:hover {
      border-color: #FF6B35;
      background: rgba(255, 107, 53, 0.2);
    }
    
    .screenshot-preview {
      max-width: 100%;
      max-height: 250px;
      border-radius: 15px;
      border: 3px solid #FF6B35;
      margin-top: 15px;
    }
    
    .remove-btn {
      position: absolute;
      top: -15px;
      right: -15px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 1.5rem;
    }
    
    .submit-btn {
      width: 100%;
      padding: 25px;
      font-size: 1.5rem;
      background: linear-gradient(45deg, #FF6B35, #FF1493);
      color: white;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-family: 'Bebas Neue';
      letter-spacing: 4px;
      font-weight: bold;
      transition: all 0.4s;
    }
    
    .submit-btn:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(255, 107, 53, 0.6);
    }
    
    @media (max-width: 768px) {
      .container {
        margin: 10px;
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 2.5rem;
      }
      
      input, select {
        padding: 15px;
        font-size: 1.1rem;
      }
      
      .screenshot-box {
        padding: 40px 15px;
        margin: 20px 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>AIMX 2026 Registration</h1>
    
    <div class="payment-box">
      <h2>Payment Details</h2>
      <div class="payment-option">
        <span>UPI ID:</span>
        <strong>ashutoshdp2003@okaxis</strong>
      </div>
      <div class="payment-option">
        <span>Bank Account:</span>
        <strong>5346933814 (KKBK0001465)</strong>
      </div>
    </div>
    
    <form>
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" placeholder="Enter your full name" required>
      </div>
      
      <div class="form-group">
        <label>Mobile Number *</label>
        <input type="tel" placeholder="10 digit mobile number" required>
      </div>
      
      <div class="form-group">
        <label>Email *</label>
        <input type="email" placeholder="your@email.com" required>
      </div>
      
      <div class="form-group">
        <label>College / University *</label>
        <input type="text" placeholder="Your college name" required>
      </div>
      
      <div class="form-group">
        <label>Event *</label>
        <select required>
          <option>Vice City Visuals - UI/UX Battle (₹100)</option>
          <option>Mission Backtrack - Output to Input (₹100)</option>
          <option>Hack Wanted - Hackathon (₹300)</option>
          <option>Startup Syndicate - Shark Tank (₹200)</option>
          <option>City Groove - Dance (₹150)</option>
          <option>Fashion Heist - Fashion Show (₹200)</option>
          <option>Urban Warfare - Valorant (₹400)</option>
          <option>Street Fighter Showdown (₹50)</option>
          <option>The Grand Heist - Treasure Hunt (₹150)</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Team Name (Optional)</label>
        <input type="text" placeholder="Your team name">
      </div>
      
      <div class="form-group">
        <label>Transaction ID * (12 digits)</label>
        <input type="text" placeholder="123456789012" maxlength="12" required>
        <small>Enter exact 12-digit UPI/Bank transaction ID</small>
      </div>
      
      <div class="screenshot-box" onclick="this.querySelector('input').click()">
        <div style="font-size: 4rem; margin-bottom: 20px;">📁</div>
        <p style="font-size: 1.3rem; margin-bottom: 10px;">Drag & Drop Payment Screenshot</p>
        <p>OR Click to Browse (JPG/PNG max 5MB)</p>
        <input type="file" accept="image/*" style="display: none;" onchange="previewFile(this)">
      </div>
      
      <div class="screenshot-preview-container" style="display: none; margin: 20px 0; text-align: center;">
        <img id="screenshot-preview" class="screenshot-preview" style="max-width: 100%; max-height: 250px; border-radius: 15px; border: 3px solid #FF6B35;">
        <button type="button" onclick="removeScreenshot()" class="remove-btn">×</button>
      </div>
      
      <button type="submit" class="submit-btn">Submit Registration</button>
    </form>
    
    <script>
      function previewFile(input) {
        const file = input.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = function(e) {
            const preview = document.getElementById('screenshot-preview');
            const container = document.querySelector('.screenshot-preview-container');
            preview.src = e.target.result;
            container.style.display = 'block';
            input.parentNode.innerHTML += '<p style="color: #39FF14; margin-top: 10px;">Screenshot uploaded!</p>';
          };
          reader.readAsDataURL(file);
        }
      }
      
      function removeScreenshot() {
        document.querySelector('.screenshot-preview-container').style.display = 'none';
        document.querySelector('input[type=file]').value = '';
      }
      
      document.querySelector('.screenshot-box').addEventListener('dragover', (e) => {
        e.preventDefault();
        e.currentTarget.style.borderColor = '#00D4FF';
      });
      
      document.querySelector('.screenshot-box').addEventListener('dragleave', (e) => {
        e.currentTarget.style.borderColor = '#FF1493';
      });
      
      document.querySelector('.screenshot-box').addEventListener('drop', (e) => {
        e.preventDefault();
        e.currentTarget.style.borderColor = '#FF1493';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
          const input = document.querySelector('input[type=file]');
          const dt = new DataTransfer();
          dt.items.add(file);
          input.files = dt.files;
          previewFile(input);
        }
      });
    </script>
  </div>
</body>
